<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>أبوزيد · مصمم جرافيك</title>

    <!-- SEO -->
    <meta name="description" content="أبوزيد، مصمم جرافيك محترف. بطاقة تعريف رقمية فاخرة." />
    <meta name="keywords" content="مصمم جرافيك, أبوزيد, تصميم, شعارات, هوية بصرية" />

    <!-- Open Graph -->
    <meta property="og:title" content="أبوزيد - مصمم جرافيك" />
    <meta property="og:description" content="بطاقة تعريف رقمية فاخرة" />
    <meta property="og:image" content="images/og-image.jpg" />
    <meta property="og:url" content="https://www.example.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,700&family=Montserrat:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Line Icons (RemixIcon) -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-1: #b388ff;
            --accent-2: #ffd54f;
            --accent-glow: rgba(179, 136, 255, 0.12);
            --text-primary: #f0f0f8;
            --text-secondary: rgba(255, 255, 255, 0.78);
            --text-muted: rgba(255, 255, 255, 0.28);
            --border-light: rgba(255, 255, 255, 0.05);
            --border-accent: rgba(179, 136, 255, 0.18);
            --shadow-card: 0 40px 100px rgba(0, 0, 0, 0.7);
            --font-arabic: 'Almarai', sans-serif;
            --font-display: 'Playfair Display', serif;
            --font-luxury: 'Cormorant Garamond', serif;
            --font-primary: 'Montserrat', sans-serif;
            --font-name: 'El Messiri', sans-serif;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-arabic);
            background: var(--bg-primary);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ============================================================
           BACKGROUND – خلفية إبداعية
           ============================================================ */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image:
                linear-gradient(rgba(179, 136, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(179, 136, 255, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        .bg-circles {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 800px;
        }

        .bg-circles svg {
            width: 100%;
            height: 100%;
            display: block;
            animation: rotateSlow 40s linear infinite;
        }

        @keyframes rotateSlow {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .bg-curves {
            position: absolute;
            inset: 0;
            opacity: 0.06;
        }

        .bg-curves svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .bg-dots {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(179, 136, 255, 0.12) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            animation: dotsPulse 8s ease-in-out infinite alternate;
        }

        @keyframes dotsPulse {
            0% {
                opacity: 0.3;
                transform: scale(1);
            }
            100% {
                opacity: 0.7;
                transform: scale(1.05);
            }
        }

        .bg-glow {
            position: absolute;
            top: 30%;
            left: 20%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(179, 136, 255, 0.08) 0%, transparent 70%);
            filter: blur(100px);
            animation: glowFloat 12s ease-in-out infinite alternate;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: 20%;
            right: 15%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 213, 79, 0.06) 0%, transparent 70%);
            filter: blur(100px);
            animation: glowFloat 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes glowFloat {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            100% {
                transform: translate(30px, -30px) scale(1.2);
                opacity: 0.6;
            }
        }

        /* ============================================================
           CARD – بطاقة متحركة مع دخول أنيق
           ============================================================ */
        .card {
            position: relative;
            z-index: 1;
            width: min(100%, 460px);
            max-height: 94vh;
            max-height: 94dvh;
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: clamp(2.2rem, 5.5vh, 3.4rem) clamp(1.6rem, 3.5vw, 3rem) clamp(1.6rem, 3vh, 2.6rem);
            text-align: center;
            box-shadow: var(--shadow-card), 0 0 0 1px rgba(179, 136, 255, 0.02) inset;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            margin: auto;
            opacity: 0;
            transform: translateY(30px) scale(0.96);
            animation: cardEntrance 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            animation-delay: 0.2s;
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card::-webkit-scrollbar {
            width: 3px;
        }
        .card::-webkit-scrollbar-track {
            background: transparent;
        }
        .card::-webkit-scrollbar-thumb {
            background: var(--accent-1);
            border-radius: 10px;
        }

        .card:hover {
            border-color: var(--border-accent);
            box-shadow: var(--shadow-card), 0 0 0 1px rgba(179, 136, 255, 0.06) inset;
        }

        /* ============================================================
           LOGO
           ============================================================ */
        .logo-wrap {
            margin-bottom: clamp(0.4rem, 1.5vh, 1.2rem);
            position: relative;
            flex-shrink: 0;
        }

        .logo-img {
            height: clamp(52px, 9vh, 76px);
            width: auto;
            display: inline-block;
            transition: var(--transition);
            filter: drop-shadow(0 0 40px rgba(179, 136, 255, 0.08));
            border-radius: 16px;
            animation: logoFloat 6s ease-in-out infinite alternate;
        }

        @keyframes logoFloat {
            0% {
                transform: translateY(0px);
            }
            100% {
                transform: translateY(-6px);
            }
        }

        .logo-img:hover {
            transform: scale(1.06) rotate(-2deg);
            filter: drop-shadow(0 0 60px rgba(179, 136, 255, 0.18));
            animation-play-state: paused;
        }

        /* ============================================================
           NAME – بدون أي خط أو Underline
           ============================================================ */
        .name {
            font-family: var(--font-name);
            font-weight: 700;
            font-size: clamp(3.2rem, 11vw, 4.8rem);
            letter-spacing: clamp(1px, 0.3vw, 4px);
            color: var(--text-primary);
            line-height: 1.1;
            margin-bottom: 0.1rem;
            text-shadow: 0 0 80px rgba(179, 136, 255, 0.06);
            transition: var(--transition);
            position: relative;
        }

        /* ============================================================
           TITLE
           ============================================================ */
        .title {
            font-family: var(--font-primary);
            font-weight: 300;
            font-size: clamp(0.65rem, 1.3vw, 0.9rem);
            letter-spacing: clamp(4px, 0.6vw, 6px);
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: clamp(0.1rem, 0.5vh, 0.5rem);
            margin-bottom: 0.4rem;
            opacity: 0.8;
            position: relative;
        }

        /* ============================================================
           BIO – مع Typing Animation بنص خافت وأنيق
           ============================================================ */
        .bio-wrapper {
            max-width: 320px;
            margin: 0.2rem auto clamp(1.2rem, 3vh, 2.2rem);
            padding-top: clamp(0.6rem, 1.2vh, 1rem);
            border-top: 1px solid var(--border-light);
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bio {
            font-family: var(--font-arabic);
            font-weight: 300;
            font-size: clamp(0.75rem, 1.2vw, 0.95rem);
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.8;
            letter-spacing: 0.5px;
            direction: rtl;
            display: inline-block;
            min-height: 2rem;
            opacity: 0.55;
            transition: opacity 0.3s ease;
        }

        .bio .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background-color: rgba(255, 255, 255, 0.35);
            margin-right: 4px;
            vertical-align: text-bottom;
            animation: blink 0.7s step-end infinite;
            opacity: 0.5;
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 0.1;
            }
        }

        /* ============================================================
           BUTTONS
           ============================================================ */
        .row-primary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(0.5rem, 1vw, 0.8rem);
            width: 100%;
            margin-bottom: clamp(0.6rem, 1.2vw, 1rem);
        }

        .row-social {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: clamp(0.5rem, 1vw, 0.8rem);
            width: 100%;
            margin-bottom: 0;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(6px, 0.8vw, 12px);
            padding: clamp(0.6rem, 1.2vh, 0.9rem) clamp(0.4rem, 1vw, 0.8rem);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-light);
            border-radius: clamp(16px, 2.5vw, 22px);
            color: var(--text-secondary);
            text-decoration: none;
            font-family: var(--font-arabic);
            font-size: clamp(0.65rem, 1vw, 0.85rem);
            font-weight: 400;
            transition: var(--transition);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            min-height: clamp(40px, 7vh, 56px);
            flex: 1 1 auto;
            cursor: pointer;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            opacity: 0;
            transition: var(--transition);
            border-radius: inherit;
        }

        .btn:hover::before {
            opacity: 0.08;
        }

        .btn i {
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            transition: var(--transition);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .btn span {
            font-weight: 400;
            white-space: nowrap;
            position: relative;
            z-index: 1;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-accent);
            color: var(--text-primary);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.4);
        }

        .btn:hover i {
            transform: scale(1.12) rotate(-5deg);
        }

        .btn-pdf {
            background: rgba(179, 136, 255, 0.06);
            border-color: rgba(179, 136, 255, 0.12);
        }
        .btn-pdf:hover {
            background: rgba(179, 136, 255, 0.14);
            border-color: var(--accent-1);
            box-shadow: 0 16px 50px rgba(179, 136, 255, 0.12);
        }
        .btn-pdf i {
            color: var(--accent-1);
        }

        .btn-be {
            background: rgba(23, 105, 255, 0.04);
            border-color: rgba(23, 105, 255, 0.08);
        }
        .btn-be:hover {
            background: rgba(23, 105, 255, 0.12);
            border-color: #1769ff;
            box-shadow: 0 16px 50px rgba(23, 105, 255, 0.08);
        }
        .btn-be i {
            color: #1769ff;
        }

        .btn-wa {
            background: rgba(37, 211, 102, 0.04);
            border-color: rgba(37, 211, 102, 0.08);
        }
        .btn-wa:hover {
            background: rgba(37, 211, 102, 0.12);
            border-color: #25d366;
            box-shadow: 0 16px 50px rgba(37, 211, 102, 0.08);
        }
        .btn-wa i {
            color: #25d366;
        }

        .btn-ig {
            background: rgba(225, 48, 108, 0.04);
            border-color: rgba(225, 48, 108, 0.08);
        }
        .btn-ig:hover {
            background: rgba(225, 48, 108, 0.12);
            border-color: #e1306c;
            box-shadow: 0 16px 50px rgba(225, 48, 108, 0.08);
        }
        .btn-ig i {
            color: #e1306c;
        }

        .btn-fb {
            background: rgba(24, 119, 242, 0.04);
            border-color: rgba(24, 119, 242, 0.08);
        }
        .btn-fb:hover {
            background: rgba(24, 119, 242, 0.12);
            border-color: #1877f2;
            box-shadow: 0 16px 50px rgba(24, 119, 242, 0.08);
        }
        .btn-fb i {
            color: #1877f2;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            margin-top: clamp(0.8rem, 2vh, 1.6rem);
            padding-top: clamp(0.6rem, 1.2vh, 1rem);
            border-top: 1px solid var(--border-light);
            font-family: var(--font-arabic);
            font-size: clamp(0.5rem, 0.9vw, 0.7rem);
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            width: 100%;
            opacity: 0.6;
            transition: var(--transition);
        }

        .footer:hover {
            opacity: 1;
        }

        .footer .brand {
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .footer .heart {
            color: #ff6b81;
            display: inline-block;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.2);
            }
            30% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.15);
            }
            60% {
                transform: scale(1);
            }
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 420px) {
            body {
                padding: 0.8rem;
            }
            .card {
                border-radius: 32px;
                padding: 1.8rem 1rem 1.4rem;
            }
            .btn span {
                font-size: 0.55rem;
            }
            .btn i {
                font-size: 0.8rem;
            }
            .btn {
                min-height: 36px;
                padding: 0.4rem 0.3rem;
                border-radius: 14px;
            }
            .bio-wrapper {
                max-width: 220px;
                min-height: 2.4rem;
            }
            .bio {
                font-size: 0.65rem;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 1.4rem 0.6rem 1rem;
                border-radius: 24px;
            }
            .logo-img {
                height: 40px;
            }
            .name {
                font-size: 2.6rem;
            }
            .btn span {
                font-size: 0.5rem;
            }
            .btn i {
                font-size: 0.7rem;
            }
            .btn {
                min-height: 30px;
                padding: 0.2rem 0.2rem;
                gap: 4px;
            }
            .row-primary {
                gap: 0.3rem;
                margin-bottom: 0.3rem;
            }
            .row-social {
                gap: 0.3rem;
            }
            .bio-wrapper {
                display: none;
            }
            .footer {
                font-size: 0.4rem;
                margin-top: 0.4rem;
                padding-top: 0.4rem;
            }
        }

        @media (min-width: 600px) and (max-height: 800px) {
            .card {
                padding: 2rem 2.2rem 1.8rem;
            }
            .logo-img {
                height: 60px;
            }
            .name {
                font-size: 3.8rem;
            }
            .btn {
                min-height: 44px;
            }
        }

        @media (min-width: 1200px) {
            .card {
                padding: 3.4rem 3.4rem 2.8rem;
                border-radius: 48px;
            }
            .logo-img {
                height: 84px;
            }
            .name {
                font-size: 5rem;
            }
            .btn {
                min-height: 60px;
                border-radius: 24px;
            }
        }

        @media (max-height: 650px) {
            .card {
                padding: 1rem 1.4rem 0.8rem;
                border-radius: 28px;
            }
            .logo-img {
                height: 38px;
            }
            .name {
                font-size: 2.4rem;
            }
            .title {
                font-size: 0.5rem;
                margin-top: 0.1rem;
                margin-bottom: 0.1rem;
            }
            .bio-wrapper {
                margin: 0.1rem auto 0.6rem;
                padding-top: 0.3rem;
                max-width: 200px;
                min-height: 2rem;
            }
            .bio {
                font-size: 0.6rem;
            }
            .btn {
                min-height: 30px;
                padding: 0.25rem 0.3rem;
                font-size: 0.5rem;
                border-radius: 12px;
                gap: 4px;
            }
            .btn i {
                font-size: 0.7rem;
            }
            .row-primary {
                gap: 0.3rem;
                margin-bottom: 0.3rem;
            }
            .row-social {
                gap: 0.3rem;
            }
            .footer {
                margin-top: 0.3rem;
                padding-top: 0.3rem;
                font-size: 0.4rem;
            }
        }

        @media (max-height: 500px) {
            .card {
                padding: 0.6rem 0.8rem 0.4rem;
                border-radius: 20px;
            }
            .logo-img {
                height: 28px;
            }
            .name {
                font-size: 1.8rem;
            }
            .title {
                font-size: 0.4rem;
                margin-top: 0;
            }
            .bio-wrapper {
                display: none;
            }
            .btn {
                min-height: 24px;
                padding: 0.15rem 0.15rem;
                font-size: 0.4rem;
                border-radius: 10px;
                gap: 2px;
            }
            .btn i {
                font-size: 0.6rem;
            }
            .row-primary {
                gap: 0.2rem;
                margin-bottom: 0.2rem;
            }
            .row-social {
                gap: 0.2rem;
            }
            .footer {
                margin-top: 0.1rem;
                padding-top: 0.1rem;
                font-size: 0.3rem;
            }
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-1);
            border-radius: 10px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- ============================================================
    BACKGROUND
    ============================================================ -->
    <div class="bg-layer" aria-hidden="true">
        <div class="bg-grid"></div>
        <div class="bg-circles">
            <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(179,136,255,0.04)" stroke-width="1.5" />
                <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(179,136,255,0.03)" stroke-width="1.5" />
                <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(179,136,255,0.03)" stroke-width="1.5" />
                <circle cx="200" cy="200" r="60" fill="none" stroke="rgba(179,136,255,0.02)" stroke-width="1.5" />
                <circle cx="200" cy="200" r="20" fill="none" stroke="rgba(179,136,255,0.02)" stroke-width="1.5" />
            </svg>
        </div>
        <div class="bg-curves">
            <svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
                <path d="M 50 200 Q 200 100 350 250 T 650 200 T 750 350" stroke="rgba(179,136,255,0.04)" stroke-width="2" fill="none" />
                <path d="M 80 600 Q 250 700 400 550 T 680 650 T 750 500" stroke="rgba(255,213,79,0.03)" stroke-width="2" fill="none" />
                <path d="M 100 400 Q 300 300 500 450 T 700 350" stroke="rgba(179,136,255,0.03)" stroke-width="1.5" fill="none" />
            </svg>
        </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // TYPING ANIMATION – 10 جمل متغيرة مع Loop احترافي
            // ============================================================
            const phrases = [
                "أصنع هويات بصرية تُترك في الذاكرة",
                "أحول الأفكار إلى تصاميم مؤثرة",
                "تصميمات تبني الثقة قبل أن تبيع",
                "كل علامة تجارية لها قصة تستحق أن تُروى",
                "البساطة هي سر التصميم الاحترافي",
                "تصميم يجذب الانتباه ويصنع الانطباع الأول",
                "الإبداع يبدأ من فهم الفكرة",
                "هوية قوية... انطباع لا يُنسى",
                "التفاصيل الصغيرة تصنع الفرق الكبير",
                "أصمم علامات تجارية تعيش طويلًا"
            ];

            const typingElement = document.getElementById('typingText');
            let phraseIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            let isTypingComplete = false;

            // سرعات الكتابة
            const typingSpeed = 80;
            const deletingSpeed = 40;
            const pauseBeforeDelete = 1500;
            const pauseBeforeNext = 1000;

            function typeEffect() {
                if (!typingElement) return;

                const currentPhrase = phrases[phraseIndex];
                const cursorElement = typingElement.querySelector('.cursor');

                if (!isDeleting) {
                    // مرحلة الكتابة
                    typingElement.textContent = currentPhrase.substring(0, charIndex + 1);
                    if (cursorElement) {
                        typingElement.appendChild(cursorElement);
                    }

                    charIndex++;

                    if (charIndex === currentPhrase.length) {
                        isTypingComplete = true;
                        setTimeout(() => {
                            isDeleting = true;
                            isTypingComplete = false;
                            setTimeout(typeEffect, deletingSpeed);
                        }, pauseBeforeDelete);
                        return;
                    }

                    setTimeout(typeEffect, typingSpeed);
                } else {
                    // مرحلة المسح
                    const remainingText = currentPhrase.substring(0, charIndex - 1);
                    typingElement.textContent = remainingText;
                    if (cursorElement) {
                        typingElement.appendChild(cursorElement);
                    }

                    charIndex--;

                    if (charIndex === 0) {
                        isDeleting = false;
                        phraseIndex = (phraseIndex + 1) % phrases.length;
                        setTimeout(typeEffect, pauseBeforeNext);
                        return;
                    }

                    setTimeout(typeEffect, deletingSpeed);
                }
            }

            setTimeout(typeEffect, 800);

            // ============================================================
            // حماية الصور
            // ============================================================
            document.querySelectorAll('img').forEach(function(img) {
                img.setAttribute('draggable', 'false');
                img.addEventListener('dragstart', function(e) {
                    e.preventDefault();
                    return false;
                });
                img.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    return false;
                });
            });

            // ============================================================
            // منع اختصارات لوحة المفاتيح
            // ============================================================
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    return false;
                }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'i' || e.key === 'I')) {
                    e.preventDefault();
                    return false;
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
                    e.preventDefault();
                    return false;
                }
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
            });

            // ============================================================
            // منع القائمة اليمنى
            // ============================================================
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            console.log('🚀 Digital Business Card – أبوزيد (Typing Animation مع 10 جمل)');
        })();
    </script>
